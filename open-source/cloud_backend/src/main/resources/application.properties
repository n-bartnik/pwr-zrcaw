spring.application.name=ChatApp
server.port=8080
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/chatapp}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:chatapp_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:chatapp_password}
spring.jpa.hibernate.ddl-auto=update
spring.datasource.hikari.connection-timeout=90000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.initialization-fail-timeout=90000
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
s3.bucket.name=${S3_BUCKET_NAME:chatapp-uploads}
s3.endpoint=${S3_ENDPOINT:http://localhost:9000}
s3.access.key=${S3_ACCESS_KEY:minioadmin}
s3.secret.key=${S3_SECRET_KEY:minioadminpassword}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
management.metrics.tags.application=ChatApp
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.sla.http.server.requests=1ms,5ms,10ms,50ms,100ms,200ms,500ms,1s,5s
