networks:
  chatapp:
    driver: bridge

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: chatdb
    volumes:
      - db:/var/lib/postgresql/data
    networks:
      - chatapp

  backend:
    build: ./cloud_backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/chatdb
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password   
      S3_BUCKET_NAME: chatapp-uploads-bucket
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      

    depends_on:
      - db
    volumes:
      - uploads:/app/uploads
    networks:
      - chatapp

  frontend:
    build: ./cloud_frontend
    depends_on:
      - backend
    networks:
      - chatapp

volumes:
  db:
  uploads:
